<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www

    <Directory "/var/www">
        AllowOverride All
        Require all granted
    </Directory>

    # Rewrite requests to /dev/hfrnet to the correct directory
    Alias /dev/hfrnet2 /var/www/html

    <Directory "/var/www">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
