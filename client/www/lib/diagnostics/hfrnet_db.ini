; Local-development-only credentials. These must match MYSQL_USER/MYSQL_PASSWORD
; in the root .env used to provision the database. Use strong, unique
; credentials for any deployed environment.
[hfradar]
server=hfrnet-mysql
db=hfradar
user=hfrnet_user
password=hfrnet_password
port=3306

[metrics]
server=hfrnet-mysql
db=metrics
user=hfrnet_user
password=hfrnet_password
port=3306

[outages]
server=hfrnet-mysql
db=outages
user=hfrnet_user
password=hfrnet_password
port=3306